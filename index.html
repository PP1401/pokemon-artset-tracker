<meta name="apple-mobile-web-app-title" content="Artset Tracker">

<title>Pokémon Artset Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap');
  :root {
    --bg: #0d0d12; --surface: #16161e; --surface2: #1e1e2a;
    --border: #2a2a38; --text: #e8e8f0; --muted: #6b6b80; --accent: #c8b4ff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
  header {
    padding: 18px 28px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
    position: sticky; top: 0; background: rgba(13,13,18,0.95); backdrop-filter: blur(12px);
    z-index: 100; flex-wrap: wrap;
  }
  .logo { font-family: 'Unbounded', sans-serif; font-size: 1rem; font-weight: 800; white-space: nowrap; }
  .logo span { color: var(--accent); }
  .header-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .header-stats { display: flex; gap: 10px; flex-wrap: wrap; }
  .stat-pill { background: var(--surface2); border: 1px solid var(--border); border-radius: 999px; padding: 5px 14px; font-size: 0.75rem; color: var(--muted); white-space: nowrap; }
  .stat-pill strong { color: var(--accent); font-family: 'Unbounded', sans-serif; font-size: 0.8rem; }

  /* LANG SWITCH */
  .lang-switch {
    display: flex; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 999px; overflow: hidden; flex-shrink: 0;
  }
  .lang-btn {
    padding: 5px 14px; font-size: 0.72rem; font-family: 'Unbounded', sans-serif;
    font-weight: 600; letter-spacing: 0.05em; cursor: pointer;
    border: none; background: transparent; color: var(--muted);
    transition: background 0.2s, color 0.2s;
  }
  .lang-btn.active { background: var(--accent); color: #000; }

  main { max-width: 1100px; margin: 0 auto; padding: 28px 20px 80px; }
  .serie-section { margin-bottom: 36px; }
  .serie-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; cursor: pointer; user-select: none; }
  .serie-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .serie-title { font-family: 'Unbounded', sans-serif; font-size: 0.68rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); flex: 1; }
  .serie-progress-bar { flex: 1; max-width: 160px; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .serie-progress-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }
  .serie-count { font-size: 0.72rem; color: var(--muted); white-space: nowrap; }
  .serie-toggle { font-size: 0.65rem; color: var(--muted); transition: transform 0.2s; }
  .serie-section.collapsed .serie-toggle { transform: rotate(-90deg); }
  .expansions-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 10px; transition: max-height 0.35s ease, opacity 0.3s ease; overflow: hidden; }
  .serie-section.collapsed .expansions-grid { max-height: 0 !important; opacity: 0; pointer-events: none; }

  /* CARD */
  .exp-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 14px;
    display: flex; flex-direction: column; gap: 8px;
    transition: border-color 0.2s, transform 0.15s;
    position: relative; overflow: hidden;
  }
  .exp-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--card-color, var(--accent)); opacity: 0.4; transition: opacity 0.2s; }
  .exp-card:hover { border-color: color-mix(in srgb, var(--card-color, var(--accent)) 35%, transparent); transform: translateY(-1px); }
  .exp-card:hover::before { opacity: 1; }
  .exp-card.complete::before { opacity: 1; }

  .exp-meta { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
  .exp-date { font-size: 0.62rem; color: var(--muted); font-style: italic; white-space: nowrap; }
  .complete-badge { font-size: 0.52rem; font-family: 'Unbounded', sans-serif; letter-spacing: 0.06em; background: var(--card-color, var(--accent)); color: #000; border-radius: 4px; padding: 2px 6px; font-weight: 700; opacity: 0; transform: scale(0.8); transition: opacity 0.2s, transform 0.2s; white-space: nowrap; flex-shrink: 0; }
  .exp-card.complete .complete-badge { opacity: 1; transform: scale(1); }

  .exp-name { font-size: 0.8rem; font-weight: 500; line-height: 1.3; }

  .bustine-list { display: flex; flex-direction: column; gap: 5px; }
  .bustina-row { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 8px; background: var(--surface2); border: 1px solid var(--border); cursor: pointer; transition: border-color 0.15s, background 0.15s; user-select: none; }
  .bustina-row:hover { border-color: color-mix(in srgb, var(--card-color, var(--accent)) 40%, transparent); }
  .bustina-row.owned { background: color-mix(in srgb, var(--card-color, var(--accent)) 12%, var(--surface2)); border-color: color-mix(in srgb, var(--card-color, var(--accent)) 40%, transparent); }
  .bustina-check { width: 16px; height: 16px; border-radius: 4px; flex-shrink: 0; border: 1.5px solid var(--border); background: transparent; transition: background 0.15s, border-color 0.15s; display: flex; align-items: center; justify-content: center; }
  .bustina-row.owned .bustina-check { background: var(--card-color, var(--accent)); border-color: var(--card-color, var(--accent)); }
  .bustina-check svg { display: none; }
  .bustina-row.owned .bustina-check svg { display: block; }
  .bustina-name { font-size: 0.75rem; color: var(--text); flex: 1; line-height: 1.2; }
  .bustina-row.owned .bustina-name { color: color-mix(in srgb, var(--card-color, var(--accent)) 80%, var(--text)); }

  .artset-fraction { font-family: 'Unbounded', sans-serif; font-size: 0.65rem; color: var(--muted); text-align: right; }
  .artset-fraction.complete { color: var(--card-color, var(--accent)); }

  #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 9px 18px; font-size: 0.8rem; color: var(--text); z-index: 9999; transition: transform 0.3s ease; pointer-events: none; }
  #toast.show { transform: translateX(-50%) translateY(0); }
  @media (max-width: 600px) { .expansions-grid { grid-template-columns: 1fr 1fr; } .exp-name { font-size: 0.74rem; } }
</style>

// ═══════════════════════════════════════════════════
// LANG & STORAGE
// ═══════════════════════════════════════════════════
const KEY = 'pkm-artset-v3';
const LANG_KEY = 'pkm-lang';
let col = (() => { try { return JSON.parse(localStorage.getItem(KEY)) || {}; } catch { return {}; } })();
let lang = localStorage.getItem(LANG_KEY) || 'it';

function save() { localStorage.setItem(KEY, JSON.stringify(col)); }
function saveLang() { localStorage.setItem(LANG_KEY, lang); }

function setLang(l) {
  lang = l;
  saveLang();
  document.getElementById('btn-it').classList.toggle('active', l === 'it');
  document.getElementById('btn-en').classList.toggle('active', l === 'en');
  buildUI();
}

function getName(exp) { return lang === 'en' ? exp.nameEN : exp.nameIT; }
function getSerieLabel(serie) { return lang === 'en' ? serie.labelEN : serie.labelIT; }

function formatDate(dateStr) {
  const d = new Date(dateStr);
  return d.toLocaleDateString(lang === 'it' ? 'it-IT' : 'en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
}

// ═══════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════
let toastT;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastT); toastT = setTimeout(() => el.classList.remove('show'), 2200);
}

function countOwned(expId) {
  const o = col[expId] || {};
  return Object.values(o).filter(Boolean).length;
}

function findExp(id) {
  for (const s of SERIES) {
    const e = s.expansions.find(e => e.id === id);
    if (e) return { exp: e, serie: s };
  }
}

// ═══════════════════════════════════════════════════
// TOGGLE
// ═══════════════════════════════════════════════════
function toggleBustina(expId, idx) {
  if (!col[expId]) col[expId] = {};
  col[expId][idx] = !col[expId][idx];
  save();
  refreshCard(expId);
  updateStats();
  const { exp, serie } = findExp(expId);
  if (countOwned(expId) === exp.artset.length) toast('🎉 ' + getName(exp) + ' completato!');
  refreshSerieBar(serie);
}

// ═══════════════════════════════════════════════════
// REFRESH SINGLE CARD
// ═══════════════════════════════════════════════════
function refreshCard(expId) {
  const card = document.getElementById('card-' + expId);
  if (!card) return;
  const { exp } = findExp(expId);
  const owned = countOwned(expId);
  const isComplete = owned >= exp.artset.length;
  exp.artset.forEach((_, i) => {
    const row = document.getElementById('row-' + expId + '-' + i);
    if (row) row.classList.toggle('owned', !!(col[expId] && col[expId][i]));
  });
  const frac = card.querySelector('.artset-fraction');
  frac.textContent = owned + '/' + exp.artset.length;
  frac.classList.toggle('complete', isComplete);
  card.classList.toggle('complete', isComplete);
}

// ═══════════════════════════════════════════════════
// STATS & SERIE BAR
// ═══════════════════════════════════════════════════
function updateStats() {
  let total = 0, owned = 0, complete = 0;
  SERIES.forEach(s => s.expansions.forEach(exp => {
    total += exp.artset.length;
    const o = countOwned(exp.id);
    owned += o;
    if (o >= exp.artset.length) complete++;
  }));
  document.getElementById('stat-owned').textContent = owned;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-complete').textContent = complete;
}

function refreshSerieBar(serie) {
  const tot = serie.expansions.reduce((s, e) => s + e.artset.length, 0);
  const own = serie.expansions.reduce((s, e) => s + countOwned(e.id), 0);
  const pct = tot ? Math.round(own / tot * 100) : 0;
  const bar = document.getElementById('bar-' + serie.id);
  const cnt = document.getElementById('cnt-' + serie.id);
  if (bar) bar.style.width = pct + '%';
  if (cnt) cnt.textContent = own + '/' + tot;
}

// ═══════════════════════════════════════════════════
// BUILD UI
// ═══════════════════════════════════════════════════
function buildUI() {
  const app = document.getElementById('app');
  app.innerHTML = '';

  // Aggiorna bottoni lingua
  document.getElementById('btn-it').classList.toggle('active', lang === 'it');
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');

  SERIES.forEach(serie => {
    const tot = serie.expansions.reduce((s, e) => s + e.artset.length, 0);
    const own = serie.expansions.reduce((s, e) => s + countOwned(e.id), 0);
    const pct = tot ? Math.round(own / tot * 100) : 0;

    const section = document.createElement('section');
    section.className = 'serie-section';
    section.id = 'serie-' + serie.id;
    section.innerHTML = `
      <div class="serie-header" onclick="toggleSerie('${serie.id}')">
        <div class="serie-dot" style="background:${serie.color}"></div>
        <div class="serie-title">${getSerieLabel(serie)}</div>
        <div class="serie-progress-bar">
          <div class="serie-progress-fill" id="bar-${serie.id}" style="width:${pct}%;background:${serie.color}"></div>
        </div>
        <div class="serie-count" id="cnt-${serie.id}">${own}/${tot}</div>
        <div class="serie-toggle">▾</div>
      </div>
      <div class="expansions-grid" id="grid-${serie.id}"></div>
    `;
    app.appendChild(section);
    const grid = section.querySelector('.expansions-grid');

    serie.expansions.forEach(exp => {
      const card = document.createElement('div');
      const ownedCount = countOwned(exp.id);
      const isComplete = ownedCount >= exp.artset.length;

      card.className = 'exp-card' + (isComplete ? ' complete' : '');
      card.id = 'card-' + exp.id;
      card.style.setProperty('--card-color', serie.color);

      const checkSvg = `<svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="#000" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

      const rowsHtml = exp.artset.map((subj, i) => {
        const isOwned = !!(col[exp.id] && col[exp.id][i]);
        return `<div class="bustina-row${isOwned ? ' owned' : ''}" id="row-${exp.id}-${i}" onclick="toggleBustina('${exp.id}', ${i})">
          <div class="bustina-check">${checkSvg}</div>
          <div class="bustina-name">${subj}</div>
        </div>`;
      }).join('');

      card.innerHTML = `
        <div class="exp-meta">
          <div class="exp-date">${formatDate(exp.date)}</div>
          <div class="complete-badge">${lang === 'it' ? 'COMPLETO' : 'COMPLETE'}</div>
        </div>
        <div class="exp-name">${getName(exp)}</div>
        <div class="bustine-list">${rowsHtml}</div>
        <div class="artset-fraction${isComplete ? ' complete' : ''}">${ownedCount}/${exp.artset.length}</div>
      `;
      grid.appendChild(card);
    });

    grid.style.maxHeight = grid.scrollHeight + 'px';
  });

  updateStats();
}

function toggleSerie(id) {
  const section = document.getElementById('serie-' + id);
  const grid = document.getElementById('grid-' + id);
  const isCollapsed = section.classList.contains('collapsed');
  if (isCollapsed) {
    section.classList.remove('collapsed');
    grid.style.maxHeight = grid.scrollHeight + 'px';
  } else {
    grid.style.maxHeight = grid.scrollHeight + 'px';
    requestAnimationFrame(() => section.classList.add('collapsed'));
  }
}

buildUI();
</script>
